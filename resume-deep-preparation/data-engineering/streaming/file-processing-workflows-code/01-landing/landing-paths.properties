# Landing zone paths (local = test-data; prod = S3 bucket)
landing.base.path=test-data
landing.positions.prefix=positions/
landing.mtm_pnl.prefix=mtm_pnl/

# File naming patterns
positions.file.pattern=equilend_positions_\\d{8}\\.csv
mtm_pnl.file.pattern=equilend_mtm_pnl_\\d{8}\\.csv

# Source system id for idempotency key
source.system=EQUILEND
